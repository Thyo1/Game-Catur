<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Elite Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-menu" class="menu-container">
        <h1 class="game-title main-title">CHESS ELITE</h1>
        <p class="subtitle">Select Game Mode</p>
        
        <div class="menu-buttons" id="main-menu-buttons">
            <button class="menu-btn" onclick="startGame('local')">🎮 Local Multiplayer (Berdua)</button>
            <button class="menu-btn" onclick="showBotMenu()">🤖 Lawan Bot AI</button>
            <button class="menu-btn" onclick="startGame('online')">🌐 Main Online (Segera)</button>
        </div>

        <div class="menu-buttons hidden" id="bot-menu-buttons">
            <button class="menu-btn" onclick="startBotGame(1)">🟢 Level 1: Pemula (Acak)</button>
            <button class="menu-btn" onclick="startBotGame(2)">🟠 Level 2: Menengah (Rakus)</button>
            <button class="menu-btn" onclick="startBotGame(3)">🔴 Level 3: Pro (Minimax)</button>
            <button class="menu-btn" style="background: rgba(255, 50, 50, 0.2);" onclick="hideBotMenu()">⬅ Kembali</button>
        </div>
    </div>

    <div id="game-over-modal" class="modal-container hidden">
        <div class="modal-content">
            <h2 id="winner-title">SKAKMAT!</h2>
            <p id="winner-message">Putih memenangkan pertandingan.</p>
            <button class="menu-btn" style="margin: 0 auto;" onclick="backToMenuFromModal()">Main Lagi</button>
        </div>
    </div>

    <div id="game-screen" class="main-wrapper hidden">
        
        <div class="header-section">
            <div class="top-controls">
                <button class="btn-toggle" onclick="backToMenu()">⬅ Menu</button>
                <div class="status-badge" id="turn-status">Turn: <span>PUTIH</span></div>
                <div class="timer match-timer" id="match-timer">00:00</div>
                <button id="toggle-view" class="btn-toggle">Mode: 3D</button>
            </div>
            
            <div id="ai-loading" class="hidden">🤖 AI sedang memikirkan langkah...</div>
        </div>

        <div class="game-layout">
            <div class="player-panel">
                <div class="graveyard-box" id="dead-white-bin"></div> 
            </div>

            <div class="board-container">
                <div class="chessboard is-3d" id="chessboard"></div>
            </div>

            <div class="player-panel">
                <div class="graveyard-box" id="dead-black-bin"></div> 
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
